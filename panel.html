<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg-color: #202124;
      --header-bg: #292a2d;
      --border-color: #3c4043;
      --text-color: #e8eaed;
      --accent-color: #8ab4f8;
    }

    body { 
      font-family: 'Segoe UI', Tahoma, sans-serif; 
      font-size: 12px; 
      margin: 0; 
      background: var(--bg-color); 
      color: var(--text-color); 
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Sticky Header */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand { display: flex; align-items: center; gap: 8px; }
    
    .logo { 
      width: 18px; 
      height: 18px; 
      object-fit: contain; 
    }

    .title { font-weight: bold; color: var(--accent-color); }

    #clear-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: background 0.2s;
    }

    #clear-btn:hover { background: #35363a; border-color: #5f6368; }

    /* Request Cards */
    #container { flex: 1; overflow-y: auto; }
    .request-card { 
      border-bottom: 1px solid var(--border-color); 
      padding: 12px; 
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .method { font-weight: bold; margin-right: 8px; }
    .url { color: #81c995; word-break: break-all; font-family: monospace; }
    pre { 
      background: #161617; 
      padding: 10px; 
      border-radius: 4px; 
      overflow-x: auto; 
      border: 1px solid #303134;
      margin-top: 8px;
    }
    .header-label { color: #f28b82; font-size: 10px; text-transform: uppercase; margin-top: 10px; }
    
    .placeholder { padding: 40px; text-align: center; color: #9aa0a6; }
    
    /* Copy Button Styles */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .copy-btn {
      background: #3c4043;
      color: #bdc1c6;
      border: 1px solid #5f6368;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 10px;
      cursor: pointer;
    }

    .copy-btn:hover {
      background: #4a4d51;
      color: #fff;
    }

    .copy-btn:active {
      background: var(--accent-color);
      color: #202124;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <div class="brand">
      <img src="logomark.png" class="logo" alt="CF">
      <span class="title">Cloudflare APIFilter</span>
    </div>
    <button id="clear-btn">Clear Logs</button>
  </div>

  <div id="container">
    <div class="placeholder">Waiting for /api/v4/ (Accounts/Zones) requests...</div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
